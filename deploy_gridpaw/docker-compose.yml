# GridPaw Multi-Tenant Service
# Static compose file — only nginx gateway + admin service.
# GridPaw user instances are created dynamically by admin via Docker API.
#
# Configuration is read from .env (auto-loaded by compose).
# Start with: ./prepare.sh up

# Compose 项目名，决定资源前缀（如网络名变为 {name}_gridpaw-net）
name: gridpaw-multi-tenant-service

# 网络定义：nginx、admin、租户容器均需加入此网络以互通
networks:
  gridpaw-net:
    driver: bridge

services:
  # 网关服务：唯一对外端口，认证代理 + 动态路由
  nginx:
    image: gridpaw-nginx:latest
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-8087}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gridpaw-net
    depends_on:
      - admin
    restart: unless-stopped

  # 管理服务：认证 + 租户管理 API + Web 面板 + 共享文件服务
  admin:
    image: gridpaw-admin:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./admin-service:/app/admin-service
      - ${GRIDPAW_DATA:-/var/gridpaw}:/app/gridpaw_data:rw
    environment:
      - DOCKER_NETWORK=gridpaw-multi-tenant-service_gridpaw-net
      - TENANT_IMAGE=${TENANT_IMAGE:-gridpaw-tenant:latest}
      - INSTANCE_PREFIX=${INSTANCE_PREFIX:-gridpaw-instance-}
      - GRIDPAW_DATA=${GRIDPAW_DATA:-/var/gridpaw}
      - FILE_SERVICE_BASE_URL=${FILE_SERVICE_BASE_URL:-http://127.0.0.1}
      - NGINX_PORT=${NGINX_PORT:-8087}
    networks:
      - gridpaw-net
    restart: unless-stopped
