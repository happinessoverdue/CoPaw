worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;

    # Disable proxy buffering for SSE streaming from GridPaw
    proxy_buffering off;
    proxy_cache off;

    # Docker internal DNS — required when proxy_pass uses variables
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # ---- Auth endpoints (handled by admin service) ----

        location /auth/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Admin management panel ----

        location /admin/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Shared file service (no auth, for tool uploads & frontend reads) ----

        location /share_files/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 100m;
        }

        # ---- Auth validation subrequest ----

        location = /_auth_check {
            internal;
            proxy_pass http://admin:9000/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # ---- All other requests: authenticate then proxy to GridPaw instance ----

        location / {
            auth_request /_auth_check;

            # Capture instance name from auth response
            auth_request_set $gridpaw_instance $upstream_http_x_gridpaw_instance;

            # On auth failure, redirect to login
            error_page 401 = @login_redirect;

            # Route to the correct GridPaw instance
            proxy_pass http://$gridpaw_instance:8088;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for SSE streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeout for LLM streaming responses
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @login_redirect {
            return 302 $scheme://$http_host/auth/login;
        }
    }
}
