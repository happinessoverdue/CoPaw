worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;

    # Disable proxy buffering for SSE streaming from GridPaw
    proxy_buffering off;
    proxy_cache off;

    # Docker internal DNS — required when proxy_pass uses variables
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # ---- Auth endpoints (handled by admin service) ----

        location /auth/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Admin management panel ----

        location /admin/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Shared file service (no auth, for tool uploads & frontend reads) ----

        location /share_files/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 100m;
        }

        # ---- Auth validation subrequest ----

        location = /_auth_check {
            internal;
            proxy_pass http://admin:9000/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # ---- All other requests: authenticate then proxy to GridPaw instance ----

        location / {
            auth_request /_auth_check;

            # Capture instance name from auth response
            auth_request_set $gridpaw_instance $upstream_http_x_gridpaw_instance;

            # On auth failure, redirect to login
            error_page 401 = @login_redirect;

            # Inject user info card into GridPaw HTML pages
            sub_filter '</body>' '
            <div id="gridpaw-user-card" style="position:fixed;top:10px;left:10px;z-index:99999;
              background:rgba(228,226,242,0.58);border:1px solid rgba(97,92,237,0.32);
              border-radius:12px;padding:10px 14px;
              font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
              font-size:12px;color:#615ced;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
              box-shadow:0 4px 20px rgba(97,92,237,0.12),inset 0 1px 0 rgba(255,255,255,0.6);
              display:flex;align-items:center;gap:12px;opacity:0;transition:opacity 0.3s;
              pointer-events:none">
              <div style="flex:1;line-height:1.6;min-width:0">
                <div style="display:flex;align-items:baseline;gap:6px">
                  <span id="gridpaw-uname" style="font-weight:600;font-size:13px;color:#4a46b8">-</span>
                  <span id="gridpaw-uid" style="color:#615ced;font-size:11px">-</span>
                </div>
                <div id="gridpaw-inst" style="color:#7a76f0;font-size:10px;
                  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">-</div>
              </div>
              <a href="/auth/logout" style="flex-shrink:0;padding:5px 12px;background:#615ced;color:#fff;
                border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;
                transition:background 0.15s;pointer-events:auto"
                onmouseover="this.style.background=&quot;#504cd4&quot;"
                onmouseout="this.style.background=&quot;#615ced&quot;">&#36864;&#20986;</a>
            </div>
            <div id="gridpaw-credit-card" style="position:fixed;bottom:10px;left:10px;z-index:99998;
              background:rgba(228,226,242,0.58);border:1px solid rgba(97,92,237,0.32);
              border-radius:12px;padding:8px 12px;
              font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
              font-size:11px;color:#615ced;line-height:1.5;
              backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
              box-shadow:0 4px 20px rgba(97,92,237,0.12),inset 0 1px 0 rgba(255,255,255,0.6);
              pointer-events:none">
              <b>GridPaw</b> (Original by <b>agentscope-ai/CoPaw</b>)<br>
              Prod. by <b>Li Linxin</b> (feat. <b>Claude Opus 4.6</b> &#215; <b>GLM 5</b>)
            </div>
            <script>
            fetch("/auth/whoami").then(function(r){return r.json()}).then(function(d){
              if(d.logged_in){
                var el=document.getElementById("gridpaw-uname");if(el)el.textContent=d.user_name||"";
                el=document.getElementById("gridpaw-uid");if(el)el.textContent=d.user_id||"";
                el=document.getElementById("gridpaw-inst");
                if(el){el.textContent=d.instance||"";el.title=d.instance||"";}
                var card=document.getElementById("gridpaw-user-card");if(card)card.style.opacity="1";
              }
            }).catch(function(){
              var card=document.getElementById("gridpaw-user-card");if(card)card.style.opacity="1";
            });
            </script></body>';
            sub_filter_once on;
            proxy_set_header Accept-Encoding "";

            # Route to the correct GridPaw instance
            proxy_pass http://$gridpaw_instance:8088;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for SSE streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeout for LLM streaming responses
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @login_redirect {
            return 302 $scheme://$http_host/auth/login;
        }
    }
}
