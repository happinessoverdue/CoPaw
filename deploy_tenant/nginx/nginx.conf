worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    keepalive_timeout 65;

    # Disable proxy buffering for SSE streaming from CoPaw
    proxy_buffering off;
    proxy_cache off;

    # Docker internal DNS — required when proxy_pass uses variables
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # ---- Auth endpoints (handled by admin service) ----

        location /auth/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Admin management panel ----

        location /admin/ {
            proxy_pass http://admin:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Auth validation subrequest ----

        location = /_auth_check {
            internal;
            proxy_pass http://admin:9000/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # ---- All other requests: authenticate then proxy to CoPaw instance ----

        location / {
            auth_request /_auth_check;

            # Capture instance name from auth response
            auth_request_set $copaw_instance $upstream_http_x_copaw_instance;

            # On auth failure, redirect to login
            error_page 401 = @login_redirect;

            # Inject user info card into CoPaw HTML pages
            sub_filter '</body>' '
            <div id="copaw-user-card" style="position:fixed;top:10px;left:10px;z-index:99999;
              background:rgba(30,41,59,0.95);border:1px solid rgba(100,116,139,0.35);
              border-radius:10px;padding:10px 14px;
              font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
              font-size:12px;color:#e2e8f0;backdrop-filter:blur(12px);
              box-shadow:0 4px 16px rgba(0,0,0,0.35);
              display:flex;align-items:center;gap:12px;opacity:0;transition:opacity 0.3s">
              <div style="flex:1;line-height:1.6;min-width:0">
                <div style="display:flex;align-items:baseline;gap:6px">
                  <span id="copaw-uname" style="font-weight:600;font-size:13px;color:#f1f5f9">-</span>
                  <span id="copaw-uid" style="color:#94a3b8;font-size:11px">-</span>
                </div>
                <div id="copaw-inst" style="color:#64748b;font-size:10px;
                  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">-</div>
              </div>
              <a href="/auth/logout" style="flex-shrink:0;padding:5px 12px;background:#dc2626;color:#fff;
                border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;
                transition:background 0.15s"
                onmouseover="this.style.background=&quot;#b91c1c&quot;"
                onmouseout="this.style.background=&quot;#dc2626&quot;">退出</a>
            </div>
            <script>
            fetch("/auth/whoami").then(function(r){return r.json()}).then(function(d){
              if(d.logged_in){
                var el=document.getElementById("copaw-uname");if(el)el.textContent=d.user_name||"";
                el=document.getElementById("copaw-uid");if(el)el.textContent=d.user_id||"";
                el=document.getElementById("copaw-inst");
                if(el){el.textContent=d.instance||"";el.title=d.instance||"";}
                var card=document.getElementById("copaw-user-card");if(card)card.style.opacity="1";
              }
            }).catch(function(){
              var card=document.getElementById("copaw-user-card");if(card)card.style.opacity="1";
            });
            </script></body>';
            sub_filter_once on;
            proxy_set_header Accept-Encoding "";

            # Route to the correct CoPaw instance
            proxy_pass http://$copaw_instance:8088;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for SSE streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeout for LLM streaming responses
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location @login_redirect {
            return 302 $scheme://$http_host/auth/login;
        }
    }
}
